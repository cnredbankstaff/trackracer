html, body { height: 100%; margin: 0; overflow: hidden; }
* { box-sizing: border-box; }

@keyframes pulse-glow {

  50% { filter: brightness(1.3); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

@keyframes particle-fly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
}

.particle {
  position: absolute;
  pointer-events: none;
  animation: particle-fly 0.6s ease-out forwards;
}

@keyframes countdown-pop {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.countdown-anim {
  animation: countdown-pop 0.5s ease-out forwards;
}

@keyframes runner-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.running { animation: runner-bob 0.15s ease-in-out infinite; }

canvas { display: block; }
</style>

  <script>
// Audio Manager using Web Audio API
class AudioManager {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.enabled = false; }
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }
  play(type) {
    if (!this.enabled || !this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    if (type === 'step') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(200 + Math.random()*80, now);
      gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.08);
      osc.start(now); osc.stop(now+0.08);
    } else if (type === 'perfect') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1320, now+0.15);
      gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.start(now); osc.stop(now+0.2);
    } else if (type === 'bad') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
      gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      osc.start(now); osc.stop(now+0.15);
    } else if (type === 'countdown') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(440, now);
      gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      osc.start(now); osc.stop(now+0.2);
    } else if (type === 'go') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(660, now); osc.frequency.setValueAtTime(880, now+0.1);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.3);
      osc.start(now); osc.stop(now+0.3);
    } else if (type === 'finish') {
      [523,659,784,1047].forEach((f,i) => {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.type = 'sine'; o.frequency.setValueAtTime(f, now+i*0.12);
        g.gain.setValueAtTime(0.1, now+i*0.12); g.gain.exponentialRampToValueAtTime(0.001, now+i*0.12+0.3);
        o.start(now+i*0.12); o.stop(now+i*0.12+0.3);
      });
    }
  }
}

const audio = new AudioManager();

// Runner base
class Runner {
  constructor(name, color, lane, emoji) {
    this.name = name; this.color = color; this.lane = lane; this.emoji = emoji;
    this.x = 0; this.speed = 0; this.maxSpeed = 320;
    this.lastKey = null; this.lastPressTime = 0;
    this.combo = 0; this.stamina = 100;
    this.animFrame = 0; this.animTimer = 0;
    this.finished = false; this.finishTime = 0;
    this.isRunning = false;
  }
  reset() {
    this.x = 0; this.speed = 0; this.lastKey = null; this.lastPressTime = 0;
    this.combo = 0; this.stamina = 100; this.animFrame = 0; this.animTimer = 0;
    this.finished = false; this.finishTime = 0; this.isRunning = false;
  }
  update(dt) {
    // Decay
    this.speed *= 0.992;
    if (this.speed < 5) this.speed = 5;
    // Stamina regen
    this.stamina = Math.min(100, this.stamina + dt * 3);
    // Move
    this.x += this.speed * dt;
    // Anim
    this.isRunning = this.speed > 20;
    if (this.isRunning) {
      this.animTimer += dt * (this.speed / 60);
      if (this.animTimer > 1) { this.animTimer = 0; this.animFrame = (this.animFrame + 1) % 4; }
    }
  }
  handleKeyPress(key) {
    const now = performance.now() / 1000;
    const dt = now - this.lastPressTime;
    // Wrong key (same key twice)
    if (key === this.lastKey) {
      this.speed = Math.max(5, this.speed - 40);
      this.combo = 0;
      this.lastPressTime = now;
      return 'bad';
    }
    let result;
    if (dt >= 0.25 && dt <= 0.55) {
      // Perfect window
      const staminaCost = 2;
      this.stamina = Math.max(0, this.stamina - staminaCost);
      const staminaMult = this.stamina > 20 ? 1 : 0.4;
      this.combo++;
      const comboBonus = Math.min(this.combo * 3, 30);
      this.speed = Math.min(this.maxSpeed, this.speed + (45 + comboBonus) * staminaMult);
      result = 'perfect';
    } else if (dt >= 0.15 && dt <= 0.75) {
      // OK window
      this.stamina = Math.max(0, this.stamina - 1.5);
      this.combo = Math.max(0, this.combo - 1);
      this.speed = Math.min(this.maxSpeed, this.speed + 18);
      result = 'ok';
    } else {
      // Too slow or too fast
      this.combo = 0;
      this.speed = Math.max(5, this.speed - 15);
      this.stamina = Math.max(0, this.stamina - 1);
      result = 'bad';
    }
    this.lastKey = key;
    this.lastPressTime = now;
    return result;
  }
}

// AI Runner
class AIRunner extends Runner {
  constructor(name, color, lane, emoji, skill) {
    super(name, color, lane, emoji);
    this.skill = skill; // 0-1, higher = better
    this.nextPressTime = 0;
    this.aiLastKey = 'a';
  }
  reset() {
    super.reset();
    this.nextPressTime = 0; this.aiLastKey = 'a';
  }
  aiUpdate(gameTime) {
    if (gameTime >= this.nextPressTime) {
      // Decide timing quality
      const r = Math.random();
      let interval;
      if (r < this.skill * 0.7) {
        // Perfect timing
        interval = 0.3 + Math.random() * 0.2;
      } else if (r < this.skill * 0.9 + 0.1) {
        // OK
        interval = 0.2 + Math.random() * 0.5;
      } else {
        // Bad
        interval = 0.1 + Math.random() * 0.9;
      }
      // Alternate key
      this.aiLastKey = this.aiLastKey === 'a' ? 'd' : 'a';
      this.handleKeyPress(this.aiLastKey);
      this.nextPressTime = gameTime + interval;
    }
  }
}

// Main game
const TRACK_LENGTH = 4000;

class Game {
  constructor() {
    this.state = 'menu'; // menu, countdown, racing, finished
    this.canvas = document.getElementById('gameCanvas');
    this.ctx2d = this.canvas.getContext('2d');
    this.player = new Runner('You', '#ff6b35', 0, '🏃');
    this.ais = [
      new AIRunner('Flash', '#3b82f6', 1, '🏃', 0.85),
      new AIRunner('Dash', '#a855f7', 2, '🏃', 0.6),
      new AIRunner('Bolt', '#ef4444', 3, '🏃', 0.4),
    ];
    this.allRunners = [this.player, ...this.ais];
    this.cameraX = 0;
    this.gameTime = 0;
    this.finishOrder = [];
    this.lastTime = 0;
    this.expectedKey = 'a';
    this.feedbackTimer = 0;

    this.resize();
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('keydown', (e) => this.onKey(e));

    // Touch support
    document.getElementById('keyA').addEventListener('pointerdown', (e) => { e.preventDefault(); this.processKey('a'); });
    document.getElementById('keyD').addEventListener('pointerdown', (e) => { e.preventDefault(); this.processKey('d'); });

    this.loop(performance.now());
  }

  resize() {
    const r = window.devicePixelRatio || 1;
    this.canvas.width = window.innerWidth * r;
    this.canvas.height = window.innerHeight * r;
    this.canvas.style.width = window.innerWidth + 'px';
    this.canvas.style.height = window.innerHeight + 'px';
    this.ctx2d.scale(r, r);
    this.W = window.innerWidth;
    this.H = window.innerHeight;
  }

  start() {
    audio.init();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    this.resize();
    this.startCountdown();
  }

  restart() {
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('gameScreen').classList.remove('hidden');
    this.allRunners.forEach(r => r.reset());
    this.cameraX = 0; this.gameTime = 0; this.finishOrder = [];
    this.expectedKey = 'a'; this.feedbackTimer = 0;
    this.startCountdown();
  }

  startCountdown() {
    this.state = 'countdown';
    const cdEl = document.getElementById('countdown');
    const cdText = document.getElementById('countdownText');
    const hud = document.getElementById('hud');
    hud.classList.add('hidden');
    cdEl.classList.remove('hidden');
    let count = 3;
    const tick = () => {
      if (count > 0) {
        cdText.textContent = count;
        cdText.className = 'countdown-anim';
        cdText.style.color = count === 1 ? '#ffd700' : 'white';
        audio.play('countdown');
        void cdText.offsetWidth;
        count--;
        setTimeout(tick, 800);
      } else {
        cdText.textContent = 'GO!';
        cdText.className = 'countdown-anim';
        cdText.style.color = '#35d07b';
        audio.play('go');
        setTimeout(() => {
          cdEl.classList.add('hidden');
          hud.classList.remove('hidden');
          this.state = 'racing';
          this.lastTime = performance.now();
          this.gameTime = 0;
          // Init AI press times
          this.ais.forEach(ai => { ai.nextPressTime = Math.random() * 0.3; });
        }, 500);
      }
    };
    tick();
  }

  onKey(e) {
    if (this.state !== 'racing') return;
    const k = e.key.toLowerCase();
    if (k === 'a' || k === 'arrowleft') { e.preventDefault(); this.processKey('a'); }
    else if (k === 'd' || k === 'arrowright') { e.preventDefault(); this.processKey('d'); }
  }

  processKey(key) {
    if (this.state !== 'racing' || this.player.finished) return;
    audio.play('step');
    const result = this.player.handleKeyPress(key);
    this.expectedKey = key === 'a' ? 'd' : 'a';
    this.showFeedback(result);
    this.updateHUD();

    // Highlight key
    const kA = document.getElementById('keyA');
    const kD = document.getElementById('keyD');
    if (key === 'a') {
      kA.style.background = 'rgba(255,215,0,0.4)'; kA.style.borderColor = '#ffd700';
      kA.style.transform = 'scale(1.1)';
      setTimeout(() => { kA.style.background = 'rgba(0,0,0,0.3)'; kA.style.borderColor = 'rgba(255,255,255,0.3)'; kA.style.transform = 'scale(1)'; }, 100);
    } else {
      kD.style.background = 'rgba(255,215,0,0.4)'; kD.style.borderColor = '#ffd700';
      kD.style.transform = 'scale(1.1)';
      setTimeout(() => { kD.style.background = 'rgba(0,0,0,0.3)'; kD.style.borderColor = 'rgba(255,255,255,0.3)'; kD.style.transform = 'scale(1)'; }, 100);
    }

    if (result === 'perfect') {
      audio.play('perfect');
      this.spawnParticles();
    } else if (result === 'bad') {
      audio.play('bad');
    }
  }

  showFeedback(result) {
    const el = document.getElementById('timingFeedback');
    if (result === 'perfect') {
      el.textContent = 'PERFECT!';
      el.style.color = '#35d07b';
      el.style.textShadow = '0 0 12px rgba(53,208,123,0.6)';
    } else if (result === 'ok') {
      el.textContent = 'OK';
      el.style.color = '#ffd700';
      el.style.textShadow = '0 0 12px rgba(255,215,0,0.4)';
    } else {
      el.textContent = 'BAD';
      el.style.color = '#ef4444';
      el.style.textShadow = '0 0 12px rgba(239,68,68,0.4)';
    }
    this.feedbackTimer = 0.5;
  }

  updateHUD() {
    const pct = (this.player.speed / this.player.maxSpeed) * 100;
    document.getElementById('speedBar').style.width = pct + '%';
    const sColor = pct > 70 ? '#ff6b35' : pct > 40 ? '#ffd700' : '#35d07b';
    document.getElementById('speedBar').style.background = `linear-gradient(90deg, ${sColor}, #ffd700)`;
    document.getElementById('comboText').textContent = this.player.combo + 'x';
    document.getElementById('staminaBar').style.width = this.player.stamina + '%';
    const stColor = this.player.stamina > 50 ? '#35d07b' : this.player.stamina > 20 ? '#ffd700' : '#ef4444';
    document.getElementById('staminaBar').style.background = `linear-gradient(90deg, ${stColor}, ${stColor})`;
  }

  spawnParticles() {
    const container = document.getElementById('particles');
    const cx = this.W * 0.15;
    const laneH = Math.min(60, this.H / 6);
    const cy = this.H * 0.45 + this.player.lane * laneH;
    for (let i = 0; i < 6; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = Math.random() * Math.PI * 2;
      const dist = 20 + Math.random() * 40;
      p.style.cssText = `left:${cx}px;top:${cy}px;width:6px;height:6px;border-radius:50%;background:${['#ffd700','#ff6b35','#35d07b'][i%3]};--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;`;
      container.appendChild(p);
      setTimeout(() => p.remove(), 600);
    }
  }

  loop(ts) {
    requestAnimationFrame((t) => this.loop(t));
    if (this.state !== 'racing') {
      if (this.state === 'countdown') this.draw();
      return;
    }

    const dt = Math.min((ts - this.lastTime) / 1000, 0.05);
    this.lastTime = ts;
    this.gameTime += dt;

    // Feedback fade
    if (this.feedbackTimer > 0) {
      this.feedbackTimer -= dt;
      if (this.feedbackTimer <= 0) {
        document.getElementById('timingFeedback').style.color = 'transparent';
      }
    }

    // Update runners
    this.allRunners.forEach(r => {
      if (!r.finished) r.update(dt);
    });

    // AI
    this.ais.forEach(ai => {
      if (!ai.finished) ai.aiUpdate(this.gameTime);
    });

    // Check finishes
    this.allRunners.forEach(r => {
      if (!r.finished && r.x >= TRACK_LENGTH) {
        r.finished = true;
        r.finishTime = this.gameTime;
        this.finishOrder.push(r);
        if (r === this.player) audio.play('finish');
      }
    });

    // Camera follows player
    this.cameraX = this.player.x - this.W * 0.15;

    this.updateHUD();
    this.draw();

    // All finished?
    if (this.finishOrder.length === 4) {
      this.state = 'finished';
      setTimeout(() => this.showResults(), 800);
    }
  }

  draw() {
    const c = this.ctx2d;
    const W = this.W, H = this.H;
    c.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = c.createLinearGradient(0, 0, 0, H * 0.5);
    skyGrad.addColorStop(0, '#4a90d9');
    skyGrad.addColorStop(1, '#87CEEB');
    c.fillStyle = skyGrad;
    c.fillRect(0, 0, W, H * 0.5);

    // Clouds
    c.fillStyle = 'rgba(255,255,255,0.6)';
    const cloudX = (-this.cameraX * 0.05) % (W + 200);
    [[cloudX, H*0.1], [cloudX + W*0.5, H*0.15], [cloudX + W*0.8, H*0.08]].forEach(([cx,cy]) => {
      c.beginPath(); c.arc(cx, cy, 25, 0, Math.PI*2); c.arc(cx+20, cy-10, 20, 0, Math.PI*2);
      c.arc(cx+40, cy, 22, 0, Math.PI*2); c.fill();
    });

    // Stadium bg
    c.fillStyle = '#d4d4d4';
    c.fillRect(0, H*0.25, W, H*0.15);
    // Stands rows
    for (let i = 0; i < 5; i++) {
      c.fillStyle = i % 2 === 0 ? '#bbb' : '#ccc';
      c.fillRect(0, H*0.25 + i * H*0.03, W, H*0.03);
    }
    // Crowd dots
    c.fillStyle = '#888';
    for (let i = 0; i < 60; i++) {
      const cx2 = (i * 37 + this.cameraX * 0.02) % W;
      const cy2 = H*0.27 + (i%5)*H*0.025;
      c.beginPath(); c.arc(cx2, cy2, 3, 0, Math.PI*2); c.fill();
    }

    // Track
    const trackTop = H * 0.42;
    const laneH = Math.min(60, H / 6);
    const trackH = laneH * 4;

    // Track surface
    c.fillStyle = '#d2691e';
    c.fillRect(0, trackTop, W, trackH);

    // Track texture lines
    c.strokeStyle = 'rgba(0,0,0,0.08)';
    c.lineWidth = 1;
    for (let x = -this.cameraX % 40; x < W; x += 40) {
      c.beginPath(); c.moveTo(x, trackTop); c.lineTo(x, trackTop + trackH); c.stroke();
    }

    // Lane lines
    c.strokeStyle = 'rgba(255,255,255,0.4)';
    c.lineWidth = 2;
    c.setLineDash([10, 10]);
    for (let i = 1; i < 4; i++) {
      const y = trackTop + i * laneH;
      c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke();
    }
    c.setLineDash([]);

    // Track borders
    c.strokeStyle = 'white';
    c.lineWidth = 3;
    c.beginPath(); c.moveTo(0, trackTop); c.lineTo(W, trackTop); c.stroke();
    c.beginPath(); c.moveTo(0, trackTop + trackH); c.lineTo(W, trackTop + trackH); c.stroke();

    // Start line
    const startX = -this.cameraX;
    if (startX > -10 && startX < W + 10) {
      c.fillStyle = 'white';
      for (let i = 0; i < 16; i++) {
        const sx = startX + (i % 2 === 0 ? 0 : 8);
        const sy = trackTop + Math.floor(i / 2) * (trackH / 8);
        c.fillRect(sx, sy, 8, trackH / 8);
      }
    }

    // Finish line
    const finishX = TRACK_LENGTH - this.cameraX;
    if (finishX > -20 && finishX < W + 20) {
      for (let i = 0; i < 16; i++) {
        const fx = finishX + (i % 2 === 0 ? 0 : 8);
        const fy = trackTop + Math.floor(i / 2) * (trackH / 8);
        c.fillStyle = (i + Math.floor(i/2)) % 2 === 0 ? 'white' : '#222';
        c.fillRect(fx, fy, 8, trackH / 8);
      }
      // Banner
      c.fillStyle = '#ff6b35';
      c.fillRect(finishX - 5, trackTop - 30, 26, 25);
      c.fillStyle = 'white';
      c.font = "bold 10px 'Outfit'";
      c.textAlign = 'center';
      c.fillText('FINISH', finishX + 8, trackTop - 14);
    }

    // Distance markers
    c.fillStyle = 'rgba(255,255,255,0.3)';
    c.font = "10px 'Outfit'";
    c.textAlign = 'center';
    for (let m = 500; m < TRACK_LENGTH; m += 500) {
      const mx = m - this.cameraX;
      if (mx > 0 && mx < W) {
        c.fillText(m + 'm', mx, trackTop - 5);
      }
    }

    // Draw runners
    this.allRunners.forEach(r => {
      const rx = r.x - this.cameraX;
      const ry = trackTop + r.lane * laneH + laneH / 2;
      if (rx < -40 || rx > W + 40) return;

      this.drawRunner(c, rx, ry, r);
    });

    // Green ground below track
    c.fillStyle = '#3d8b3d';
    c.fillRect(0, trackTop + trackH, W, H - trackTop - trackH);
    // Grass texture
    c.strokeStyle = '#357a35';
    c.lineWidth = 1;
    for (let x = -this.cameraX % 30; x < W; x += 30) {
      c.beginPath(); c.moveTo(x, trackTop+trackH+5); c.lineTo(x+5, trackTop+trackH+15); c.stroke();
    }

    // Progress bar at bottom
    const progY = H - 20;
    c.fillStyle = 'rgba(0,0,0,0.3)';
    c.fillRect(20, progY, W - 40, 8);
    this.allRunners.forEach(r => {
      const pct = Math.min(r.x / TRACK_LENGTH, 1);
      const px = 20 + pct * (W - 40);
      c.fillStyle = r.color;
      c.beginPath(); c.arc(px, progY + 4, 5, 0, Math.PI * 2); c.fill();
    });
    // Finish flag on progress
    c.fillStyle = 'white';
    c.fillRect(W - 24, progY - 3, 2, 14);
    c.fillStyle = '#222';
    c.fillRect(W - 22, progY - 3, 6, 5);
  }

  drawRunner(c, x, y, runner) {
    const s = runner.speed / runner.maxSpeed;
    const bobY = runner.isRunning ? Math.sin(runner.animFrame * Math.PI) * 3 : 0;

    // Shadow
    c.fillStyle = 'rgba(0,0,0,0.2)';
    c.beginPath(); c.ellipse(x, y + 16, 12, 4, 0, 0, Math.PI * 2); c.fill();

    // Body
    c.fillStyle = runner.color;
    // Torso
    const lean = runner.isRunning ? Math.sin(runner.animTimer * Math.PI * 2) * 3 : 0;
    c.save();
    c.translate(x, y - bobY);

    // Legs
    const legAngle = runner.isRunning ? Math.sin(runner.animFrame * Math.PI) * 0.5 : 0;
    c.strokeStyle = runner.color;
    c.lineWidth = 4;
    c.lineCap = 'round';
    // Left leg
    c.beginPath(); c.moveTo(-3, 8); c.lineTo(-3 + Math.sin(legAngle)*10, 18); c.stroke();
    // Right leg
    c.beginPath(); c.moveTo(3, 8); c.lineTo(3 - Math.sin(legAngle)*10, 18); c.stroke();

    // Arms
    const armAngle = runner.isRunning ? Math.sin(runner.animFrame * Math.PI) * 0.6 : 0;
    c.strokeStyle = darken(runner.color, 0.15);
    c.lineWidth = 3;
    c.beginPath(); c.moveTo(-6, -2); c.lineTo(-6 - Math.sin(armAngle)*8, 6); c.stroke();
    c.beginPath(); c.moveTo(6, -2); c.lineTo(6 + Math.sin(armAngle)*8, 6); c.stroke();

    // Torso
    c.fillStyle = runner.color;
    c.beginPath(); c.roundRect(-7, -8, 14, 18, 4); c.fill();

    // Head
    c.fillStyle = '#ffd5a5';
    c.beginPath(); c.arc(0, -14, 8, 0, Math.PI * 2); c.fill();

    // Hair
    c.fillStyle = darken(runner.color, 0.3);
    c.beginPath(); c.arc(0, -17, 7, Math.PI, Math.PI * 2); c.fill();

    // Number on chest
    c.fillStyle = 'white';
    c.font = "bold 8px 'Outfit'";
    c.textAlign = 'center';
    c.fillText(runner.lane + 1, 0, 2);

    // Speed trail
    if (s > 0.5) {
      c.globalAlpha = (s - 0.5) * 0.6;
      for (let i = 1; i <= 3; i++) {
        c.fillStyle = runner.color;
        c.beginPath(); c.arc(-10 - i*6, 0, 3 - i*0.5, 0, Math.PI*2); c.fill();
      }
      c.globalAlpha = 1;
    }

    c.restore();

    // Name label
    c.fillStyle = 'rgba(0,0,0,0.5)';
    c.fillRect(x - 18, y - 34 - bobY, 36, 12);
    c.fillStyle = 'white';
    c.font = "bold 8px 'Outfit'";
    c.textAlign = 'center';
    c.fillText(runner.name, x, y - 25 - bobY);
  }

  showResults() {
    document.getElementById('gameScreen').classList.add('hidden');
    const rs = document.getElementById('resultScreen');
    rs.classList.remove('hidden');
    rs.style.display = 'flex';

    const playerPos = this.finishOrder.indexOf(this.player) + 1;
    const titles = ['🏆 CHAMPION!', '🥈 2ND PLACE!', '🥉 3RD PLACE!', '4TH PLACE'];
    document.getElementById('resultTitle').textContent = titles[playerPos - 1];
    document.getElementById('resultSub').textContent = playerPos === 1 ? 'Incredible timing!' : 'Keep practicing your rhythm!';

    let html = '';
    this.finishOrder.forEach((r, i) => {
      const medals = ['🥇','🥈','🥉',''];
      const highlight = r === this.player ? 'border:1px solid #ffd700;background:rgba(255,215,0,0.1);' : 'border:1px solid rgba(255,255,255,0.05);';
      html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;margin-bottom:6px;${highlight}">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">${medals[i]}</span>
          <span style="font-family:'Bungee',cursive;font-size:14px;color:${r.color};">${r.name}</span>
        </div>
        <span style="color:#aaa;font-size:13px;">${r.finishTime.toFixed(2)}s</span>
      </div>`;
    });
    document.getElementById('resultList').innerHTML = html;
  }
}

function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-r*amt)},${Math.max(0,g-g*amt)},${Math.max(0,b-b*amt)})`;
}

  ])
});
